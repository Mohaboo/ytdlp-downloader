name: Build YT-DLP Downloader

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Install ImageMagick
        run: |
          choco install imagemagick -y
          echo "C:\Program Files\ImageMagick" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      - name: Download yt-dlp binary
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "src-tauri/binaries/yt-dlp.exe"
          Copy-Item "src-tauri/binaries/yt-dlp.exe" "src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe"

      - name: Generate icons
        run: |
          $iconPath = "src-tauri/icons/icon.png"
          $icoPath = "src-tauri/icons/icon.ico"
          if (Test-Path $iconPath) {
            magick convert $iconPath -define icon:auto-resize=256,128,64,48,32,16 $icoPath
            Write-Host "Generated icon.ico"
          }

      - name: Build Tauri app
        run: npm run tauri:build

      - name: List build output
        run: |
          Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytdlp-downloader-exe
          path: src-tauri/target/release/*.exe

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: ytdlp-downloader-installer
          path: src-tauri/target/release/bundle/**/*.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: ytdlp-downloader-exe
          path: artifacts/exe

      - name: Download NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: ytdlp-downloader-installer
          path: artifacts/installer

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: |
            artifacts/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
